<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zakieh Sharifian — Data Scientist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>

/* ── THEME TOKENS ─────────────────────────────────────────── */
:root {
  --green:        #2E7D6B;
  --green-mid:   #3A9B85;
  --green-light: #D4EDE8;
  --blue:         #3B7FC4;
  --blue-light:  #DDE9F5;
  --near-black:  #141C1A;

  --bg:           #F4F8F6;
  --bg-alt:      #FFFFFF;
  --ink:          #141C1A;
  --ink-mid:      #2E4040;
  --muted:        #6B8080;
  --rule:        #D8E8E3;
  --card:        #FFFFFF;
  --accent:      var(--green);
  --accent-rgb:  46,125,107;
  --accent-light:var(--green-light);
  --accent2:      var(--blue);

  --serif: 'DM Serif Display', Georgia, serif;
  --sans:  'DM Sans', sans-serif;

  --transition: 0.25s ease;
}

[data-theme="dark"] {
  --bg:           #0D1514;
  --bg-alt:      #141C1A;
  --ink:          #E8F4F0;
  --ink-mid:      #B0CEC7;
  --muted:        #6E9990;
  --rule:        #1E3330;
  --card:        #182220;
  --accent:      #3AAD93;
  --accent-rgb:  58,173,147;
  --accent-light:#0F2922;
  --accent2:      #5BA3D4;
}

/* ── RESET ───────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--sans);
  font-weight:300;
  font-size:15px;
  line-height:1.7;
  -webkit-font-smoothing:antialiased;
  transition:background var(--transition), color var(--transition);
}

.page{max-width:900px;margin:0 auto;padding:0 2rem}

nav{
  position:sticky;top:0;z-index:100;
  background:rgba(0,0,0,0);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--rule);
  padding:.9rem 0;
  transition:background var(--transition),border-color var(--transition);
}
[data-theme="light"] nav{background:rgba(244,248,246,0.88)}
[data-theme="dark"]  nav{background:rgba(13,21,20,0.88)}

nav .page{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
nav .brand{font-family:var(--serif);font-size:1.05rem;color:var(--ink);text-decoration:none;letter-spacing:.01em;transition:color var(--transition)}
nav .links{display:flex;gap:1.5rem;list-style:none;align-items:center;flex-wrap:wrap}
nav .links a{text-decoration:none;color:var(--muted);font-size:.78rem;font-weight:400;letter-spacing:.08em;text-transform:uppercase;transition:color .2s}
nav .links a:hover{color:var(--accent)}

.nav-right{display:flex;align-items:center;gap:.75rem}

.theme-btn{
  width:36px;height:20px;
  background:var(--rule);
  border:none;border-radius:10px;
  cursor:pointer;position:relative;
  transition:background .25s;
  flex-shrink:0;
}
.theme-btn::after{
  content:'';
  position:absolute;
  top:3px;left:3px;
  width:14px;height:14px;
  border-radius:50%;
  background:var(--accent);
  transition:transform .25s, background .25s;
}
[data-theme="dark"] .theme-btn::after{transform:translateX(16px)}
.theme-btn-wrap{display:flex;align-items:center;gap:.45rem;font-size:.72rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
.theme-icon{font-size:.85rem;line-height:1}

.lang-toggle{
  background:var(--accent);color:#fff !important;
  padding:.28rem .8rem;border-radius:2px;
  font-size:.78rem;letter-spacing:.06em;
  text-decoration:none;font-weight:500;
  transition:opacity .2s;
}
.lang-toggle:hover{opacity:.82}

.hero{
  padding:5rem 0 3rem;
  display:grid;grid-template-columns:1fr auto;
  gap:3rem;align-items:end;
}
.hero-meta{
  font-size:.75rem;letter-spacing:.14em;text-transform:uppercase;
  color:var(--accent);font-weight:500;margin-bottom:.9rem;
  opacity:0;animation:fadeUp .6s ease forwards;
}
.hero h1{
  font-family:var(--serif);
  font-size:clamp(2.5rem,6vw,3.8rem);
  line-height:1.08;letter-spacing:-.02em;
  margin-bottom:1.1rem;
  opacity:0;animation:fadeUp .6s ease .1s forwards;
  color:var(--ink);
}
.hero h1 em{font-style:italic;color:var(--muted)}
.hero-desc{
  max-width:500px;color:var(--muted);
  font-size:.93rem;line-height:1.85;
  margin-bottom:2rem;
  opacity:0;animation:fadeUp .6s ease .2s forwards;
}
.hero-cta{
  display:flex;gap:1rem;flex-wrap:wrap;
  opacity:0;animation:fadeUp .6s ease .3s forwards;
}
.btn{
  display:inline-block;padding:.6rem 1.5rem;
  font-family:var(--sans);font-size:.78rem;font-weight:500;
  letter-spacing:.07em;text-transform:uppercase;
  text-decoration:none;border-radius:2px;
  transition:all .2s;cursor:pointer;border:none;
}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{filter:brightness(1.1)}
.btn-outline{
  background:transparent;color:var(--ink);
  border:1.5px solid var(--rule);
  transition:border-color .2s,color .2s;
}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}

.hero-photo{
  width:190px;height:235px;
  object-fit:cover;object-position:center top;
  border-radius:3px;
  filter:grayscale(8%);
  box-shadow:0 24px 64px rgba(0,0,0,.18);
  opacity:0;animation:fadeIn .8s ease .4s forwards;
  flex-shrink:0;
  border:3px solid var(--bg-alt);
  outline:1px solid var(--rule);
}

section{padding:4rem 0;border-top:1px solid var(--rule);transition:border-color var(--transition)}
.section-label{
  font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--accent);font-weight:500;
  margin-bottom:2.2rem;
  display:flex;align-items:center;gap:1rem;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--rule);transition:background var(--transition)}

.contact-grid{display:flex;gap:1.8rem;flex-wrap:wrap}
.contact-item{
  display:flex;align-items:center;gap:.6rem;
  font-size:.88rem;color:var(--muted);text-decoration:none;
  transition:color .2s;
}
.contact-item:hover{color:var(--accent)}
.contact-icon{
  width:30px;height:30px;
  background:var(--accent-light);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background var(--transition);
}
.contact-icon svg{width:14px;height:14px;fill:var(--accent)}

footer{
  border-top:1px solid var(--rule);padding:1.8rem 0;
  text-align:center;font-size:.75rem;color:var(--muted);letter-spacing:.04em;
  transition:border-color var(--transition);
}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

@media(max-width:660px){
  .hero{grid-template-columns:1fr}
  .hero-photo{width:130px;height:156px;justify-self:start;order:-1}
}

</style>
</head>
<body>

<nav>
  <div class="page">
    <a href="#" class="brand">Zakieh Sharifian</a>
    <div class="nav-right">
      <ul class="links">
        <li><a href="#about">About</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
      <div class="theme-btn-wrap">
        <span class="theme-icon" id="theme-icon">☀️</span>
        <button class="theme-btn" id="theme-btn"></button>
      </div>
    </div>
  </div>
</nav>

<div class="page">
  <div class="hero">
    <div>
      <div class="hero-meta">Data Scientist · Researcher · ML Engineer</div>
      <h1>Zakieh<br><em>Sharifian</em></h1>
      <p class="hero-desc">Ph.D. in Computer Science based in Bielefeld, Germany.</p>
    </div>
    <img class="hero-photo" src="your-image-url.jpg">
  </div>

  <section id="contact">
    <div class="section-label">Contact</div>
    <div class="contact-grid">
      <div class="contact-item">
        <div class="contact-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-12-7zm0 9.5a2.5 2.5 0 0 1 0-5 2.5 2.5 0 0 1 0 5z"/></svg>
        </div>
        <span>Bielefeld, North Rhine-Westphalia, Germany</span>
      </div>
      
      <a href="mailto:your-email@example.com" class="contact-item">
        <div class="contact-icon">
          <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        </div>
        <span>Email Me</span>
      </a>
    </div>
  </section>
</div>

<footer>
  <p>&copy; 2026 Zakieh Sharifian</p>
</footer>

<script>
  const btn = document.getElementById('theme-btn');
  const icon = document.getElementById('theme-icon');
  btn.addEventListener('click', () => {
    const theme = document.documentElement.getAttribute('data-theme');
    const next = theme === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    icon.innerText = next === 'light' ? '☀️' : '🌙';
  });
</script>

</body>
</html>
